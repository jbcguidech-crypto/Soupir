<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1a1a">
<title>Souffle · Respiration fonctionnelle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1a1a; --bg2:#13201f; --card:#17282a; --card2:#1c3133;
  --ink:#e9f1ee; --mut:#8aa6a2; --faint:#5f7c79;
  --teal:#2db6a4; --tealD:#1f8f86; --teal2:#0f655c;
  --amber:#e0922f; --amberD:#b87328;
  --danger:#d65a40; --dangerBg:#3a201a;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Hanken Grotesk",system-ui,sans-serif;overscroll-behavior:none}
body{min-height:100vh}
.display{font-family:"Fraunces",Georgia,serif}
h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:500;margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:radial-gradient(1200px 500px at 50% -10%, #16302e 0%, var(--bg) 60%)}
.bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;backdrop-filter:blur(8px);background:linear-gradient(var(--bg),rgba(15,26,26,.7))}
.brand{display:flex;align-items:center;gap:9px;font-family:"Fraunces";font-size:19px;letter-spacing:.3px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--teal),var(--teal2));box-shadow:0 0 14px var(--tealD)}
.boltchip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
  padding:7px 12px;border-radius:999px;font-size:13px}
.boltchip b{font-family:"Fraunces";font-size:15px}
.boltchip small{color:var(--mut);font-size:11px}
.view{flex:1;padding:6px 18px 120px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.kicker{color:var(--teal);font-size:12px;letter-spacing:1.6px;text-transform:uppercase;font-weight:600}
.lead{color:var(--mut);font-size:14px;line-height:1.55}
.h-hero{font-size:30px;line-height:1.1;margin:6px 0 4px}
.section-t{font-size:13px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut);font-weight:600;margin:22px 2px 10px}
.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
  border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.bolt-card{margin-top:10px;position:relative;overflow:hidden}
.bolt-card .ring{position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%, rgba(45,182,164,.22), transparent 60%)}
.bolt-num{font-family:"Fraunces";font-size:52px;line-height:1;display:flex;align-items:baseline;gap:8px}
.bolt-num span{font-size:18px;color:var(--mut)}
.zone-pill{display:inline-block;margin-top:8px;padding:5px 12px;border-radius:999px;font-size:12.5px;font-weight:600}
.row{display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:13px;
  padding:13px 16px;font-weight:600;font-size:15px;background:var(--card2);border:1px solid var(--line2);color:var(--ink);transition:.15s}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(180deg,var(--teal),var(--tealD));border:none;color:#04201d}
.btn.amber{background:linear-gradient(180deg,var(--amber),var(--amberD));border:none;color:#241405}
.btn.ghost{background:transparent}
.btn.block{width:100%}
.btn.sm{padding:9px 13px;font-size:13.5px;border-radius:10px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.tile{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:16px;
  padding:15px;text-align:left;position:relative;min-height:104px;display:flex;flex-direction:column;justify-content:space-between}
.tile .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px}
.tile h3{font-size:17px;margin-top:10px}
.tile small{color:var(--mut);font-size:11.5px}
.tile .cnt{position:absolute;top:13px;right:14px;color:var(--faint);font-size:12px}
.ex{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:linear-gradient(180deg,var(--card),var(--bg2));
  border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;transition:.15s}
.ex:active{transform:scale(.99)}
.ex .badge{flex:0 0 44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:19px}
.ex .meta{flex:1;min-width:0}
.ex .meta b{font-size:15.5px;font-weight:600;font-family:"Fraunces"}
.ex .meta small{display:block;color:var(--mut);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex .freq{flex:0 0 auto;font-size:11px;color:var(--teal);font-weight:600;text-align:right}
.chev{color:var(--faint);font-size:18px}
.detail .badge-lg{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;font-size:24px}
.block{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:15px;margin-top:12px}
.field-t{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:7px}
.steps{counter-reset:s;margin:0;padding:0;list-style:none}
.steps li{counter-increment:s;position:relative;padding:7px 0 7px 34px;border-bottom:1px solid var(--line);font-size:14.5px;line-height:1.45}
.steps li:last-child{border-bottom:none}
.steps li::before{content:counter(s);position:absolute;left:0;top:7px;width:23px;height:23px;border-radius:50%;
  background:var(--card2);border:1px solid var(--line2);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--teal)}
.kv{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:none}
.kv span{color:var(--mut)}.kv b{text-align:right;font-weight:600}
.safety{background:var(--dangerBg);border:1px solid #5a2c22;border-radius:14px;padding:13px 15px;margin-top:12px;font-size:13.5px;line-height:1.5;color:#f0c9bd}
.safety b{color:#f3a48f}
.player{position:fixed;inset:0;z-index:50;background:radial-gradient(800px 500px at 50% 18%, #16302e, var(--bg) 70%);
  display:flex;flex-direction:column;animation:fade .3s ease;max-width:560px;margin:0 auto}
.player .ptop{display:flex;align-items:center;justify-content:space-between;padding:16px 18px}
.player .ptop b{font-family:"Fraunces";font-size:17px}
.pclose{font-size:15px;color:var(--mut);background:var(--card);border:1px solid var(--line);padding:8px 14px;border-radius:999px}
.pstage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:10px 24px;text-align:center}
.orb-wrap{position:relative;width:280px;height:280px;display:grid;place-items:center}
.orb{width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #4fd6c4 0%, var(--teal) 38%, var(--teal2) 100%);
  box-shadow:0 0 60px rgba(45,182,164,.35), inset 0 0 40px rgba(0,0,0,.2);
  transform:scale(.55);transition:transform 4s ease-in-out}
.orb.co2{background:radial-gradient(circle at 38% 34%, #f2b566 0%, var(--amber) 40%, var(--amberD) 100%);box-shadow:0 0 60px rgba(224,146,47,.35), inset 0 0 40px rgba(0,0,0,.2)}
.orb-ring{position:absolute;inset:0;border-radius:50%;border:1px dashed rgba(255,255,255,.12)}
.phase{font-family:"Fraunces";font-size:30px;line-height:1.1}
.bigtimer{font-family:"Fraunces";font-size:74px;line-height:1;letter-spacing:1px}
.subt{color:var(--mut);font-size:14px;max-width:340px;line-height:1.5}
.counters{display:flex;gap:26px;justify-content:center;color:var(--mut);font-size:13px}
.counters b{display:block;font-family:"Fraunces";font-size:22px;color:var(--ink)}
.pctrl{padding:16px 22px calc(26px + env(safe-area-inset-bottom));display:flex;gap:12px}
.note-amber{color:var(--amber)} .note-teal{color:var(--teal)}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:30;max-width:560px;margin:0 auto;
  background:linear-gradient(rgba(15,26,26,.5),var(--bg));backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10.5px;font-weight:600;padding:6px}
.nav button.on{color:var(--teal)}
.nav .ni{font-size:19px;line-height:1}
.spark{display:flex;align-items:flex-end;gap:4px;height:64px;margin-top:10px}
.spark .b{flex:1;background:linear-gradient(var(--teal),var(--teal2));border-radius:4px 4px 0 0;min-height:4px;position:relative}
.spark .b small{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--mut)}
.scalebar{display:flex;border-radius:10px;overflow:hidden;margin-top:8px;border:1px solid var(--line)}
.scalebar div{flex:1;padding:7px 2px;text-align:center;font-size:10px;color:#fff;font-weight:600}
.muted{color:var(--mut);font-size:13px;line-height:1.55}
.src{color:var(--faint);font-size:11px;line-height:1.5;margin-top:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
.sw{width:48px;height:28px;border-radius:999px;background:var(--card2);border:1px solid var(--line2);position:relative;transition:.2s}
.sw.on{background:var(--tealD)}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.sw.on::after{left:23px}
.disclaimer{font-size:11px;color:var(--faint);line-height:1.5;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
input[type=range]{accent-color:var(--teal)}
.overlay{position:fixed;inset:0;z-index:80;background:rgba(4,12,12,.74);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border:1px solid var(--line2);border-radius:20px 20px 0 0;max-width:560px;width:100%;padding:20px 20px calc(24px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;animation:fade .3s ease}
.sheet h2{font-size:22px;margin:2px 0 10px}
.sheet .srow{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.5}
.sheet .srow:last-of-type{border-bottom:none}
.sheet .srow b{color:#f3a48f}
.sheet .ic{flex:0 0 22px;height:22px;border-radius:50%;background:var(--dangerBg);border:1px solid #5a2c22;color:#f3a48f;display:grid;place-items:center;font-weight:700;font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="brand"><span class="dot"></span> Souffle</div>
    <button class="boltchip" onclick="go('detail','bolt')">
      <span>BOLT</span><b id="chipBolt">—</b><small id="chipZone"></small>
    </button>
  </div>
  <div id="view" class="view"></div>
  <div class="nav">
    <button data-nav="home" class="on" onclick="go('home')"><span class="ni">◎</span>Accueil</button>
    <button data-nav="cats" onclick="go('cats')"><span class="ni">≋</span>Exercices</button>
    <button data-nav="track" onclick="go('track')"><span class="ni">⤴</span>Suivi</button>
    <button data-nav="info" onclick="go('info')"><span class="ni">𝒾</span>Méthode</button>
  </div>
</div>
<div id="playerRoot"></div>

<script>
const LS=window.localStorage;
function load(k,d){try{const v=LS.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function save(k,v){try{LS.setItem(k,JSON.stringify(v))}catch(e){}}
let boltHist=load('sf_bolt',[]);
let sessions=load('sf_sess',[]);
let settings=load('sf_set',{sound:true,vibe:true});
let metrics=load('sf_metrics',[]);
function todayMetric(){return metrics.filter(function(m){return m.t===todayISO();})[0];}
function saveMetric(o){var m=todayMetric();if(!m){m={t:todayISO()};metrics.push(m);}for(var k in o)m[k]=o[k];if(metrics.length>400)metrics=metrics.slice(-400);save('sf_metrics',metrics);}
function logApnea(v){if(!v)return;var m=todayMetric();var cur=(m&&m.apnea)?m.apnea:0;saveMetric({apnea:Math.max(cur,v)});}
function boltTrend(){
  if(boltHist.length<2)return{dir:'—',delta:0,avg:null};
  var last=boltHist[boltHist.length-1].s;
  var recent=boltHist.slice(-8,-1).map(function(b){return b.s;});
  if(!recent.length)return{dir:'—',delta:0,avg:null};
  var avg=recent.reduce(function(a,b){return a+b;},0)/recent.length;
  var d=last-avg;
  return{dir:d>0.8?'hausse':(d<-0.8?'baisse':'stable'),delta:d,avg:avg};
}
function readiness(){
  var s=lastBolt();
  if(s==null)return{phase:'—',deload:false,dropping:false,msg:'Fais ton test BOLT pour calibrer la journée.'};
  var t=boltTrend();var dropping=(t.dir==='baisse');var phase,msg;
  if(s<25){phase='A';msg='Phase A — fondations & récup. Priorité sommeil + nasal 24/7. Pas de table O₂ ni de VHL.';}
  else if(s<30){phase='B';msg='Phase B — reprise progressive : légère + apnea walk, table CO₂ légère, VHL 1×/sem.';}
  else if(s<40){phase='C';msg='Phase C — programme complet : table O₂, VHL 2-3×/sem, apnées plus longues.';}
  else {phase='C+';msg='Optimal — maintien & perf. Re-teste l’apnée max de temps en temps.';}
  if(dropping&&s>=25){msg='BOLT en baisse : jour allégé conseillé aujourd’hui, même si ta zone le permettrait. On consolide.';}
  return{phase:phase,deload:(s<25||dropping),dropping:dropping,trend:t,msg:msg};
}

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function fmt(s){s=Math.max(0,Math.round(s));const m=Math.floor(s/60),r=s%60;return m>0?(m+':'+String(r).padStart(2,'0')):(r+'s');}
function todayISO(){return new Date().toISOString().slice(0,10);}
function lastBolt(){return boltHist.length?boltHist[boltHist.length-1].s:null;}
function boltZone(s){
  if(s==null)return{l:'Non mesuré',c:'#5f7c79'};
  if(s<10)return{l:'Très dysfonctionnelle',c:'#b5462f'};
  if(s<20)return{l:'Dysfonctionnelle',c:'#c86a3a'};
  if(s<25)return{l:'Sous le seuil',c:'#c8902f'};
  if(s<30)return{l:'Acceptable',c:'#9a9a3f'};
  if(s<40)return{l:'Bon',c:'#3f9e86'};
  return{l:'Optimal',c:'#2db6a4'};
}
function beep(f,d){f=f||660;d=d||0.12;
  if(!settings.sound)return;
  try{const a=beep._c||(beep._c=new (window.AudioContext||window.webkitAudioContext)());
    const o=a.createOscillator(),g=a.createGain();o.frequency.value=f;o.type='sine';
    o.connect(g);g.connect(a.destination);g.gain.setValueAtTime(.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.25,a.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);
    o.start();o.stop(a.currentTime+d+.02);}catch(e){}
}
function vibe(ms){if(settings.vibe&&navigator.vibrate)try{navigator.vibrate(ms)}catch(e){}}

const CATS=[
  {id:'eval', name:'Évaluer', ic:'◔', col:'#2db6a4', desc:'Mesures & repères'},
  {id:'co2', name:'Tolérance CO₂', ic:'⬡', col:'#e0922f', desc:'Le cœur de la méthode'},
  {id:'reg', name:'Réguler · Nez', ic:'∿', col:'#2db6a4', desc:'Calme, sommeil, NO'},
  {id:'mov', name:'Apnée en mouvement', ic:'⚡', col:'#d65a40', desc:'Avancé · prudence'},
  {id:'found', name:'Fondations', ic:'⌂', col:'#2db6a4', desc:'Habitudes nasales'},
  {id:'band', name:'Bande costale', ic:'◍', col:'#2db6a4', desc:'Feedback diaphragme'},
];
const EX=[
 {id:'bolt',cat:'eval',name:'Test BOLT',benefit:'Tolérance au CO₂ & qualité du souffle',
  freq:'1×/jour, au réveil', dose:'1 mesure', nowatch:'Compte les secondes jusqu’au 1er désir',
  setup:'Le matin au réveil, après ~10 min de repos, assis le dos droit, au calme.',
  steps:['Respire normalement par le nez.','Après une expiration <b>normale</b> (non forcée), pince le nez et démarre.','Arrête au <b>1er désir défini</b> de respirer (contraction du ventre/gorge, déglutition).','Relâche : la 1re inspiration doit rester calme et nasale.'],
  safety:'Ce n’est pas une apnée maximale.', player:'bolt'},
 {id:'retmax',cat:'eval',name:'Rétention max',benefit:'Définit ta référence 50 % pour la table CO₂',
  freq:'1× / 2–4 sem', dose:'1 essai', nowatch:'Signal d’arrêt = fortes contractions',
  setup:'Assis, au repos, au sec. À faire rarement.',
  steps:['Inspire ~70–80 % (sans forcer ni packing).','Pince le nez et retiens.','Tiens jusqu’aux <b>fortes contractions</b>, bien avant tout vertige.','Note la durée : 50 % = ta durée de table CO₂.'],
  safety:'Jamais d’hyperventilation avant ; jamais dans l’eau.', player:'hold', sv:'retmax'},
 {id:'expmax',cat:'eval',name:'Expiration max',benefit:'Contrôle expiratoire & diaphragme',
  freq:'1–2×/sem (test)', dose:'1–2 essais', nowatch:'Jusqu’à la sensation de poumons vides',
  setup:'Assis, détendu.',
  steps:['Inspire confortablement.','Expire le plus <b>lentement et longtemps</b> possible, en continu.','Va jusqu’à poumons quasi vides, sans forcer la fin.'],
  safety:null, player:'hold', sv:'expmax'},
 {id:'light',cat:'co2',name:'Respiration légère',benefit:'Base de la méthode · ↑ tolérance CO₂',
  freq:'2–3×/jour', dose:'1 série de 5–10 min', nowatch:'~40–60 respirations légères',
  setup:'Assis ou allongé, détendu, épaules basses, 100 % nasal.',
  steps:['Pose une main sur le ventre.','Réduis le volume à ~<b>80 %</b> du normal : respirations plus petites et lentes.','Laisse monter une faim d’air <b>légère et tolérable</b>.','Garde le souffle silencieux ; ne crispe pas le ventre.'],
  safety:'Faim d’air légère, jamais la suffocation.', player:'pacer',
  pacer:{kind:'teal',phases:[{l:'Inspire (petit)',d:4,k:'in'},{l:'Expire (lent)',d:6,k:'out'}],secs:300,note:'Vise une légère faim d’air, sans forcer.'}},
 {id:'apnea',cat:'co2',name:'Apnea Walk',benefit:'↑ tolérance CO₂ · effet altitude',
  freq:'1×/jour (5–6 j/sem)', dose:'8–10 apnées · repos ~30–45 s', nowatch:'Compte les pas tenus ; repos ~10–15 respirations',
  setup:'À jeun, terrain plat et dégagé, respiration nasale.',
  steps:['Marche ~1 min en respirant par le nez.','Expire doucement, pince le nez et marche en apnée.','Marche jusqu’à une faim d’air <b>moyenne à forte</b>.','Reprends en <b>minimisant</b> la respiration ~15 s.','Récupère normalement, puis recommence.'],
  safety:'Jamais dans l’eau ni en conduisant. Sol plat.', player:'apnea',
  apnea:{rounds:8,reduced:15,recover:35,walkPrep:true}},
 {id:'unblock',cat:'co2',name:'Décongestion nasale',benefit:'Débloque le nez (le CO₂ rouvre les voies)',
  freq:'au besoin, jusqu’à 1×/jour', dose:'6 apnées · repos 1–2 min', nowatch:'Faim d’air moyenne-forte ; objectif ~80 pas tenus',
  setup:'Assis bien droit (version statique) ou debout. Nez très bouché ? Prends une petite inspiration par le coin de la bouche.',
  steps:['Petite inspiration nasale, petite expiration nasale, silencieuses.','Pince le nez, bouche fermée.','<b>Statique</b> : hoche la tête (haut/bas) ou balance le buste. <b>Variante active</b> : marche, ou mouvement plus vif (squats, marche sur place) pour faire monter le CO₂ plus vite.','Tiens jusqu’à une faim d’air <b>moyenne à forte</b> (jamais maximale).','Relâche, reprends par le nez en <b>2–3 souffles calmes</b> (si tu halètes, tu as tenu trop longtemps).','Attends 1–2 min, répète ~6 fois. Vas-y doucement aux premiers essais.'],

function exById(id){return EX.find(e=>e.id===id);}
function exByCat(c){return EX.filter(e=>e.cat===c);}

let cur='home';
function setNav(n){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.nav===n));}
function go(where,arg){
  cur=where;const v=$('#view');
  if(where==='home'){renderHome(v);setNav('home');}
  else if(where==='cats'){renderCats(v);setNav('cats');}
  else if(where==='catlist'){renderCatList(v,arg);setNav('cats');}
  else if(where==='detail'){renderDetail(v,arg);setNav('cats');}
  else if(where==='track'){renderTrack(v);setNav('track');}
  else if(where==='info'){renderInfo(v);setNav('info');}
  else if(where==='prog'){renderProg(v);setNav('info');}
  else if(where==='sport'){renderSport(v);setNav('home');}
  window.scrollTo(0,0);refreshChip();
}
function refreshChip(){
  const s=lastBolt(),z=boltZone(s);
  $('#chipBolt').textContent=s==null?'—':s+'s';
  $('#chipZone').textContent=s==null?'à tester':z.l.split(' ')[0];
  $('#chipZone').style.color=z.c;
}

function renderHome(v){
  const s=lastBolt(),z=boltZone(s);v.innerHTML='';
  v.appendChild(el('div','kicker','Respiration fonctionnelle'));
  v.appendChild(el('h1','h-hero display','Respire mieux,<br>chaque jour.'));
  const c=el('div','card bolt-card');
  c.innerHTML='<div class="ring"></div>'+
    '<div style="font-size:12px;color:var(--mut);letter-spacing:1px;text-transform:uppercase">Score BOLT</div>'+
    '<div class="bolt-num">'+(s==null?'—':s)+'<span>'+(s==null?'':'secondes')+'</span></div>'+
    '<div class="zone-pill" style="background:'+z.c+'22;color:'+z.c+';border:1px solid '+z.c+'55">'+z.l+'</div>'+
    '<div class="row" style="margin-top:14px">'+
    '<button class="btn primary block" onclick="go(\'detail\',\'bolt\')">'+(s==null?'Faire le test':'Re-tester')+'</button>'+
    '<button class="btn block" onclick="go(\'track\')">Historique</button></div>';
  v.appendChild(c);
  var _r=readiness();
  if(lastBolt()!=null){
    var _bc=_r.deload?'#e0922f':'#2db6a4';
    var _bn=el('div','card');_bn.style.cssText='margin-top:12px;border-left:3px solid '+_bc;
    _bn.innerHTML='<div class="field-t" style="color:'+_bc+'">État du jour · Phase '+_r.phase+(_r.dropping?' · BOLT en baisse':'')+'</div><div class="muted">'+_r.msg+'</div>';
    v.appendChild(_bn);
  }
  v.appendChild(el('div','section-t','Routine du jour'));
  suggestRoutine(s).forEach(id=>{const e=exById(id);if(e)v.appendChild(exRow(e));});
  v.appendChild(el('div','section-t','Apaisement express'));
  ['sigh','coh'].forEach(id=>v.appendChild(exRow(exById(id))));
  var _sp=el('button','btn block','Respirer par sport & intensité ›');_sp.style.marginTop='16px';_sp.onclick=function(){go('sport');};v.appendChild(_sp);
  v.appendChild(el('div','disclaimer','Fondé sur la méthode Oxygen Advantage et la littérature. Ne remplace pas un avis médical.'));
}
function suggestRoutine(s){
  if(s==null)return['bolt','light','coh'];
  if(readiness().deload)return['bolt','light','coh','unblock'];
  if(s<30)return['bolt','light','apnea','coh'];
  if(s<40)return['bolt','light','apnea','co2table','478'];
  return['bolt','light','apnea','co2table','vhl'];
}

function renderCats(v){
  v.innerHTML='';
  v.appendChild(el('div','kicker','Bibliothèque'));
  v.appendChild(el('h1','h-hero display','Exercices'));
  v.appendChild(el('p','lead','Chaque exercice détaille la mise en place, l’exécution pas à pas, la dose, la fréquence et un repère sans montre.'));
  const g=el('div','tiles');
  CATS.forEach(cat=>{
    const t=el('button','tile');t.onclick=()=>go('catlist',cat.id);
    t.innerHTML='<div class="cnt">'+exByCat(cat.id).length+'</div>'+
      '<div class="ic" style="background:'+cat.col+'22;color:'+cat.col+'">'+cat.ic+'</div>'+
      '<div><h3>'+cat.name+'</h3><small>'+cat.desc+'</small></div>';
    g.appendChild(t);
  });
  v.appendChild(g);
}
function renderCatList(v,catId){
  const cat=CATS.find(c=>c.id===catId);v.innerHTML='';
  const back=el('button','btn sm ghost','‹ Familles');back.onclick=()=>go('cats');v.appendChild(back);
  v.appendChild(el('div','kicker',cat.desc));
  v.appendChild(el('h1','h-hero display',cat.name));
  if(catId==='mov')v.appendChild(el('div','safety','<b>Avancé · risque de syncope.</b> Faim d’air modérée, jamais après hyperventilation ni dans l’eau, près du sol, idéalement accompagné. Stop au moindre vertige.'));
  exByCat(catId).forEach(e=>v.appendChild(exRow(e)));
}
function exRow(e){
  const cat=CATS.find(c=>c.id===e.cat);
  const r=el('button','ex');r.onclick=()=>go('detail',e.id);
  r.innerHTML='<div class="badge" style="background:'+cat.col+'1f;color:'+cat.col+'">'+cat.ic+'</div>'+
    '<div class="meta"><b>'+e.name+'</b><small>'+e.benefit+'</small></div>'+
    '<div class="freq">'+e.freq+'</div><div class="chev">›</div>';
  return r;
}

function renderDetail(v,id){
  const e=exById(id),cat=CATS.find(c=>c.id===e.cat);v.innerHTML='';
  const back=el('button','btn sm ghost','‹ Retour');back.onclick=()=>go('catlist',e.cat);v.appendChild(back);
  const head=el('div','detail');head.style.cssText='display:flex;gap:14px;align-items:center;margin:10px 2px 2px';
  head.innerHTML='<div class="badge-lg" style="background:'+cat.col+'1f;color:'+cat.col+'">'+cat.ic+'</div>'+
    '<div><div class="kicker" style="color:'+cat.col+'">'+cat.name+'</div><h1 style="font-size:24px;margin-top:3px">'+e.name+'</h1></div>';
  v.appendChild(head);
  v.appendChild(el('p','lead',e.benefit));
  const kv=el('div','block');
  kv.innerHTML='<div class="kv"><span>Fréquence</span><b style="color:'+cat.col+'">'+e.freq+'</b></div>'+
    '<div class="kv"><span>Dose</span><b>'+e.dose+'</b></div>'+
    '<div class="kv"><span>Sans montre</span><b>'+e.nowatch+'</b></div>';
  v.appendChild(kv);
  const b=el('div','block');
  b.innerHTML='<div class="field-t">Mise en place</div><div class="muted" style="margin-bottom:12px">'+e.setup+'</div><div class="field-t">Exécution</div>';
  const ol=el('ol','steps');e.steps.forEach(s=>ol.appendChild(el('li',null,s)));b.appendChild(ol);v.appendChild(b);
  if(e.safety)v.appendChild(el('div','safety','<b>Sécurité.</b> '+e.safety));
  if(e.player!=='info'){
    const bolt=lastBolt();
    const gated=(e.cat==='mov'||['apnea','co2table','o2table','retmax'].indexOf(e.id)>=0)&&(bolt!=null&&bolt<20);
    const start=el('button','btn '+((e.cat==='co2'||e.cat==='mov')?'amber':'primary')+' block');
    start.style.marginTop='16px';start.textContent='Démarrer';
    start.onclick=function(){
      if(gated&&!confirm('Ton BOLT est < 20 s. Les apnées ne sont pas recommandées à ce stade : consolide d’abord la respiration légère. Démarrer quand même ?'))return;
      openPlayer(e);
    };
    v.appendChild(start);
  }
}

/* ---- player engine ---- */
let activeTimers=[],cancelled=false;
function clearTimers(){activeTimers.forEach(t=>{clearTimeout(t);clearInterval(t);});activeTimers=[];}
function closePlayer(){cancelled=true;clearTimers();$('#playerRoot').innerHTML='';}
function logSession(name){sessions.push({t:new Date().toISOString(),name:name});if(sessions.length>200)sessions=sessions.slice(-200);save('sf_sess',sessions);}
function playerShell(title,bodyHtml){
  cancelled=false;clearTimers();
  const p=el('div','player');
  p.innerHTML='<div class="ptop"><b>'+title+'</b><button class="pclose" onclick="closePlayer()">Fermer</button></div>'+
    '<div class="pstage" id="pstage">'+(bodyHtml||'')+'</div><div class="pctrl" id="pctrl"></div>';
  $('#playerRoot').innerHTML='';$('#playerRoot').appendChild(p);return p;
}
function openPlayer(e){
  if(e.player==='pacer')playPacer(e);
  else if(e.player==='bolt')playBolt(e);
  else if(e.player==='hold')playHold(e);
  else if(e.player==='apnea')playApnea(e);
  else if(e.player==='table')playTable(e);
  else if(e.player==='o2table')playO2Table(e);
  else if(e.player==='reps')playReps(e);
}

async function runPacer(e){
  const cfg=e.pacer,orb=$('#orb');
  let cycle=0,elapsed=0;const total=cfg.secs||0;
  const scaleFor=function(k){return k==='in'?1:k==='in2'?1.08:(k==='out'?0.55:(k==='hold'?1:0.55));};
  try{
    await sleep(400);
    while(!cancelled){
      for(let i=0;i<cfg.phases.length;i++){
        const ph=cfg.phases[i];
        $('#phase').textContent=ph.l;
        beep(ph.k==='in'||ph.k==='in2'?720:ph.k==='out'?440:560,0.1);vibe(18);
        orb.style.transitionDuration=ph.d+'s';
        orb.style.transform='scale('+scaleFor(ph.k)+')';
        await sleep(ph.d*1000);
        elapsed+=ph.d;
        if(cfg.secs)$('#ptimer').textContent=fmt(Math.max(0,total-elapsed));
      }
      cycle++;
      if(cfg.cycles){$('#ptimer').textContent=cycle+'/'+cfg.cycles+' cycles';if(cycle>=cfg.cycles)break;}
      if(cfg.secs&&elapsed>=total)break;
    }
    if(!cancelled)finishPacer(e);
  }catch(x){}
}

  msb.onclick=function(){
    function num(id){var x=document.getElementById(id).value;return x===''?null:+x;}
    var o={},a=num('mAp'),sp=num('mSp'),ai=num('mAir'),rp=num('mRpe');
    if(a!=null)o.apnea=a;if(sp!=null)o.spo2=sp;if(ai!=null)o.air=ai;if(rp!=null)o.rpe=rp;
    saveMetric(o);beep(740,0.12);vibe(30);go('track');
  };
  v.appendChild(el('div','section-t','Séances récentes'));
  if(sessions.length){
    sessions.slice(-12).reverse().forEach(function(s){
      const d=new Date(s.t);const r=el('div','ex');r.style.cursor='default';
      r.innerHTML='<div class="badge" style="background:#2db6a41f;color:var(--teal)">✓</div>'+
        '<div class="meta"><b>'+s.name+'</b><small>'+d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+'</small></div>';
      v.appendChild(r);
    });
    const clr=el('button','btn sm ghost','Effacer l’historique');clr.style.marginTop='8px';
    clr.onclick=function(){if(confirm('Effacer toutes les données locales (BOLT + séances + journal) ?')){boltHist=[];sessions=[];metrics=[];save('sf_bolt',[]);save('sf_sess',[]);save('sf_metrics',[]);go('track');refreshChip();}};
    v.appendChild(clr);
  }else v.appendChild(el('p','muted','Tes séances guidées apparaîtront ici.'));
}

    '<b>Récupération</b> : sommeil, hydratation, fer/ferritine (un bilan sanguin est utile si tu vises l’hémato).<br>'+

function renderInfo(v){
  v.innerHTML='';
  v.appendChild(el('div','kicker','Repères & méthode'));
  v.appendChild(el('h1','h-hero display','La méthode'));
  const c=el('div','card');
  c.innerHTML='<div class="field-t">Interpréter le BOLT (le matin)</div>'+
    '<div class="scalebar"><div style="background:#b5462f">&lt;10</div><div style="background:#c86a3a">10–20</div>'+
    '<div style="background:#c8902f">20–25</div><div style="background:#7faf57">25–30</div>'+
    '<div style="background:#3f9e86">30–40</div><div style="background:#2db6a4">40+</div></div>'+
    '<div class="muted" style="margin-top:10px">25 s = seuil minimum · 40 s = optimal. Vise +1 à +2 s/semaine. S’il baisse, allège (respiration légère, sommeil, stress). Les apnées s’introduisent à partir de ~20 s.</div>';
  v.appendChild(c);
  const how=el('div','block');
  how.innerHTML='<div class="field-t">Les 3 leviers</div><div class="muted">1 · Réduire les pertes de CO₂ (respiration nasale, légère, lente).<br>2 · Augmenter la tolérance au CO₂ (légère, apnées, table CO₂).<br>3 · Simuler l’altitude <b>au niveau de la mer, sans matériel</b> : apnées + VHL <b>sur l’expiration</b> (bas volume) → SpO₂ ~87 %, proche de la haute altitude.</div>';
  v.appendChild(how);
  const epo=el('div','block');
  epo.innerHTML='<div class="field-t">EPO &amp; altitude — au juste</div><div class="muted">L’EPO est surtout déclenchée par l’<b>hypoxie</b> (rein, voie HIF). La voie fiable = <b>altitude</b> réelle ou simulée. L’<b>apnée</b> provoque une contraction de la rate (↑ hémoglobine transitoire) et une hausse d’EPO jusqu’à ~5 h après l’effort — mais de façon nette seulement avec des apnées <b>longues et intenses</b>, chez des pratiquants <b>expérimentés</b>. Tes apnées courtes (VHL) donnent surtout des gains <b>métaboliques</b> (CO₂/lactate, RSA), pas un vrai gain hématologique durable.</div>';
  v.appendChild(epo);
  const pb=el('button','btn block primary','Programme apnée (12 semaines)');pb.style.marginTop='12px';pb.onclick=()=>go('prog');
  v.appendChild(pb);
  v.appendChild(el('div','src','Réf. EPO/apnée : de Bruijn 2008 (+24 % EPO) · Elia/Kjeld 2015-2019 (élites) · Bouten 2019-2025 (rate, revue) · Précart/Woorons 2025 (VHL).'));
  const anch=el('div','block');
  anch.innerHTML='<div class="field-t">3 ancrages quotidiens</div><div class="muted">• Réveil : test BOLT, au repos<br>• Journée : respiration nasale, légère<br>• Soir : expiration longue (4-7-8 / cohérence)</div>';
  v.appendChild(anch);
  v.appendChild(el('div','safety','<b>Sécurité générale.</b> Jamais d’apnée dans l’eau ou en conduisant · jamais d’hyperventilation avant une apnée · faim d’air <b>tolérable</b>, jamais la suffocation · l’apnée en mouvement près du sol et idéalement accompagné · stop si vertige. Avis médical avant les apnées si grossesse, hypertension non contrôlée, maladie cardiovasculaire, épilepsie, diabète, anémie falciforme, troubles paniques.'));
  v.appendChild(el('div','section-t','Réglages'));
  const sset=el('div','block');
  sset.innerHTML='<div class="toggle"><span>Sons (bips de phase)</span><div class="sw '+(settings.sound?'on':'')+'" id="swSound"></div></div>'+
    '<div class="toggle" style="border-bottom:none"><span>Vibrations</span><div class="sw '+(settings.vibe?'on':'')+'" id="swVibe"></div></div>';
  v.appendChild(sset);
  $('#swSound').onclick=function(){settings.sound=!settings.sound;save('sf_set',settings);$('#swSound').classList.toggle('on',settings.sound);if(settings.sound)beep();};
  $('#swVibe').onclick=function(){settings.vibe=!settings.vibe;save('sf_set',settings);$('#swVibe').classList.toggle('on',settings.vibe);if(settings.vibe)vibe(30);};
  var _sb=el('button','btn sm ghost','Revoir les règles de sécurité');_sb.style.marginTop='12px';_sb.onclick=function(){safetyGate(true);};v.appendChild(_sb);
  v.appendChild(el('div','src','Sources : P. McKeown — Oxygen Advantage (BOLT, respiration nasale, légère, apnées) · cohérence ~0,1 Hz (Lehrer & Vaschillo) · soupir cyclique : Balban et al., Cell Reports Medicine 2023 · fredonnement/NO : Weitzberg & Lundberg 2002 · hypoventilation VHL : Précart, Woorons et al., Sports Med - Open 2025 · bande costale : feedback latéral (Functional Movement Systems).'));
  v.appendChild(el('div','disclaimer','Application pédagogique. Ne remplace pas un avis médical. Tes données restent sur cet appareil (stockage local).'));
}

const SAFETY=[
 ['Jamais dans l’eau seul','En t’entraînant seul, toujours <b>au sec</b> : ça apporte quasiment tous les bénéfices sans le risque de noyade. Le statique/dynamique en eau et la profondeur exigent un binôme formé au sauvetage.'],
 ['Jamais d’hyperventilation','Même 3-4 grandes respirations rapides masquent le signal de respirer et peuvent provoquer une syncope hypoxique. Prépare-toi <b>calmement</b> (~3-4/min, expire ≥ inspire).'],
 ['Récupère après chaque tenue','Dès la reprise : 6 souffles nettoyants (courts, ~1 s) et reste <b>assis 15 s</b>. Un malaise peut survenir 10-15 s après avoir recommencé à respirer.'],
 ['Faim d’air tolérable','Stoppe aux premières contractions fortes ou au moindre vertige. Jamais jusqu’au malaise.'],

];
function safetyGate(force){
  if(!force && load('sf_safety',false))return;
  const o=el('div','overlay');
  const rows=SAFETY.map(function(s){return '<div class="srow"><span class="ic">!</span><div><b>'+s[0]+'</b><br>'+s[1]+'</div></div>';}).join('');
  o.innerHTML='<div class="sheet"><div class="kicker" style="color:#f3a48f">Sécurité — à lire</div><h2 class="display">Avant de commencer</h2>'+rows+
    '<div class="muted" style="margin:12px 0 14px">Contenu pédagogique : ne remplace ni une formation apnée certifiée, ni un avis médical.</div>'+
    '<button class="btn block primary" id="ackBtn">J’ai compris</button></div>';
  document.body.appendChild(o);
  o.querySelector('#ackBtn').onclick=function(){save('sf_safety',true);o.remove();};
}
