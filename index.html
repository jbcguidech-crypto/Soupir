<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#eef3f2">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-v3-192.png">
<link rel="icon" href="icon-v3-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>OA 2.0 · Respiration fonctionnelle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1a1a; --bg2:#13201f; --card:#17282a; --card2:#1c3133;
  --ink:#e9f1ee; --mut:#8aa6a2; --faint:#5f7c79;
  --teal:#2db6a4; --tealD:#1f8f86; --teal2:#0f655c;
  --amber:#e0922f; --amberD:#b87328;
  --danger:#d65a40; --dangerBg:#3a201a;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Hanken Grotesk",system-ui,sans-serif;overscroll-behavior:none}
body{min-height:100vh}
.display{font-family:"Fraunces",Georgia,serif}
h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:500;margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:radial-gradient(1200px 500px at 50% -10%, #16302e 0%, var(--bg) 60%)}
.bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;backdrop-filter:blur(8px);background:linear-gradient(var(--bg),rgba(15,26,26,.7))}
.brand{display:flex;align-items:center;gap:9px;font-family:"Fraunces";font-size:19px;letter-spacing:.3px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--teal),var(--teal2));box-shadow:0 0 14px var(--tealD)}
.boltchip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
  padding:7px 12px;border-radius:999px;font-size:13px}
.boltchip b{font-family:"Fraunces";font-size:15px}
.boltchip small{color:var(--mut);font-size:11px}
.view{flex:1;padding:6px 18px 132px;animation:slidein .32s cubic-bezier(.22,.9,.35,1)}
@keyframes slidein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.kicker{color:var(--teal);font-size:12px;letter-spacing:1.6px;text-transform:uppercase;font-weight:600}
.lead{color:var(--mut);font-size:14px;line-height:1.55}
.h-hero{font-size:30px;line-height:1.1;margin:6px 0 4px}
.section-t{font-size:13px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut);font-weight:600;margin:22px 2px 10px}
.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
  border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.bolt-card{margin-top:10px;position:relative;overflow:hidden}
.bolt-card .ring{position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%, rgba(45,182,164,.22), transparent 60%)}
.bolt-num{font-family:"Fraunces";font-size:52px;line-height:1;display:flex;align-items:baseline;gap:8px}
.bolt-num span{font-size:18px;color:var(--mut)}
.zone-pill{display:inline-block;margin-top:8px;padding:5px 12px;border-radius:999px;font-size:12.5px;font-weight:600}
.row{display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:13px;
  padding:13px 16px;font-weight:600;font-size:15px;background:var(--card2);border:1px solid var(--line2);color:var(--ink);transition:.15s}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(180deg,var(--teal),var(--tealD));border:none;color:#04201d}
.btn.amber{background:linear-gradient(180deg,var(--amber),var(--amberD));border:none;color:#241405}
.btn.ghost{background:transparent}
.btn.block{width:100%}
.btn.sm{padding:9px 13px;font-size:13.5px;border-radius:10px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.tile{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:16px;
  padding:15px;text-align:left;position:relative;min-height:104px;display:flex;flex-direction:column;justify-content:space-between}
.tile .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px}
.tile h3{font-size:17px;margin-top:10px}
.tile small{color:var(--mut);font-size:11.5px}
.tile .cnt{position:absolute;top:13px;right:14px;color:var(--faint);font-size:12px}
.ex{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:linear-gradient(180deg,var(--card),var(--bg2));
  border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;transition:.15s}
.ex:active{transform:scale(.99)}
.ex .badge{flex:0 0 44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:19px}
.ex .meta{flex:1;min-width:0}
.ex .meta b{font-size:15.5px;font-weight:600;font-family:"Fraunces"}
.ex .meta small{display:block;color:var(--mut);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex .freq{flex:0 0 auto;font-size:11px;color:var(--teal);font-weight:600;text-align:right}
.chev{color:var(--faint);font-size:18px}
.detail .badge-lg{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;font-size:24px}
.block{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:15px;margin-top:12px}
.field-t{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:7px}
.steps{counter-reset:s;margin:0;padding:0;list-style:none}
.steps li{counter-increment:s;position:relative;padding:7px 0 7px 34px;border-bottom:1px solid var(--line);font-size:14.5px;line-height:1.45}
.steps li:last-child{border-bottom:none}
.steps li::before{content:counter(s);position:absolute;left:0;top:7px;width:23px;height:23px;border-radius:50%;
  background:var(--card2);border:1px solid var(--line2);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--teal)}
.kv{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:none}
.kv span{color:var(--mut)}.kv b{text-align:right;font-weight:600}
.safety{background:var(--dangerBg);border:1px solid #5a2c22;border-radius:14px;padding:13px 15px;margin-top:12px;font-size:13.5px;line-height:1.5;color:#f0c9bd}
.safety b{color:#f3a48f}
.player{position:fixed;inset:0;z-index:50;background:radial-gradient(800px 500px at 50% 18%, #16302e, var(--bg) 70%);
  display:flex;flex-direction:column;animation:fade .3s ease;max-width:560px;margin:0 auto}
.player .ptop{display:flex;align-items:center;justify-content:space-between;padding:16px 18px}
.player .ptop b{font-family:"Fraunces";font-size:17px}
.pclose{font-size:15px;color:var(--mut);background:var(--card);border:1px solid var(--line);padding:8px 14px;border-radius:999px}
.pstage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:10px 24px;text-align:center}
.orb-wrap{position:relative;width:280px;height:280px;display:grid;place-items:center}
.orb{width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #4fd6c4 0%, var(--teal) 38%, var(--teal2) 100%);
  box-shadow:0 0 60px rgba(45,182,164,.35), inset 0 0 40px rgba(0,0,0,.2);
  transform:scale(.55);transition:transform 4s ease-in-out}
.orb.co2{background:radial-gradient(circle at 38% 34%, #f2b566 0%, var(--amber) 40%, var(--amberD) 100%);box-shadow:0 0 60px rgba(224,146,47,.35), inset 0 0 40px rgba(0,0,0,.2)}
.orb-ring{position:absolute;inset:0;border-radius:50%;border:1px dashed rgba(255,255,255,.12)}
.orb-count{position:absolute;inset:0;display:grid;place-items:center;font-family:"Fraunces",Georgia,serif;font-size:48px;color:#e9f1ee;pointer-events:none;text-shadow:0 1px 5px rgba(0,0,0,.45)}
.brand .ver{font-size:10px;color:var(--faint);font-weight:600;letter-spacing:.5px}
.orb-prog{position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--teal) 0%, rgba(255,255,255,.05) 0);-webkit-mask:radial-gradient(transparent 90%,#000 91%);mask:radial-gradient(transparent 90%,#000 91%)}
.orb.holding{box-shadow:0 0 60px rgba(45,182,164,.5), inset 0 0 40px rgba(0,0,0,.2), 0 0 0 3px rgba(255,255,255,.28)}
.orb.co2.holding{box-shadow:0 0 60px rgba(224,146,47,.5), inset 0 0 40px rgba(0,0,0,.2), 0 0 0 3px rgba(255,255,255,.28)}
.phase{font-family:"Fraunces";font-size:30px;line-height:1.1}
.bigtimer{font-family:"Fraunces";font-size:74px;line-height:1;letter-spacing:1px}
.subt{color:var(--mut);font-size:14px;max-width:340px;line-height:1.5}
.counters{display:flex;gap:26px;justify-content:center;color:var(--mut);font-size:13px}
.counters b{display:block;font-family:"Fraunces";font-size:22px;color:var(--ink)}
.pctrl{padding:16px 22px calc(26px + env(safe-area-inset-bottom));display:flex;gap:12px}
.note-amber{color:var(--amber)} .note-teal{color:var(--teal)}
.nav{position:fixed;bottom:calc(10px + env(safe-area-inset-bottom));left:14px;right:14px;z-index:30;max-width:532px;margin:0 auto;
  background:rgba(23,40,42,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line2);border-radius:26px;box-shadow:0 12px 32px rgba(0,0,0,.35);
  display:flex;justify-content:space-around;gap:2px;padding:7px}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--faint);
  font-size:10.5px;font-weight:600;padding:7px 2px;min-height:48px;border-radius:19px;transition:background .2s,color .2s}
.nav button.on{color:var(--teal);background:rgba(45,182,164,.14)}
.nav button:active{transform:scale(.95)}
.nav .ni{font-size:19px;line-height:1}
.seg{display:flex;background:var(--card2);border:1px solid var(--line2);border-radius:14px;padding:4px;margin:2px 0 12px}
.seg button{flex:1;padding:10px 8px;border-radius:10px;font-weight:700;font-size:14px;color:var(--mut);transition:background .2s,color .2s}
.seg button.on{background:linear-gradient(180deg,var(--teal),var(--tealD));color:#04201d}
@media (prefers-reduced-motion: reduce){.view,.player{animation:none}.orb{transition-duration:0s !important}}
.spark{display:flex;align-items:flex-end;gap:4px;height:64px;margin-top:10px}
.spark .b{flex:1;background:linear-gradient(var(--teal),var(--teal2));border-radius:4px 4px 0 0;min-height:4px;position:relative}
.spark .b small{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--mut)}
.scalebar{display:flex;border-radius:10px;overflow:hidden;margin-top:8px;border:1px solid var(--line)}
.scalebar div{flex:1;padding:7px 2px;text-align:center;font-size:10px;color:#fff;font-weight:600}
.muted{color:var(--mut);font-size:13px;line-height:1.55}
.src{color:var(--faint);font-size:11px;line-height:1.5;margin-top:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
.sw{width:48px;height:28px;border-radius:999px;background:var(--card2);border:1px solid var(--line2);position:relative;transition:.2s}
.sw.on{background:var(--tealD)}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.sw.on::after{left:23px}
.disclaimer{font-size:11px;color:var(--faint);line-height:1.5;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
input[type=range]{accent-color:var(--teal)}
.search{width:100%;margin:6px 0 4px;background:var(--card);border:1px solid var(--line2);border-radius:12px;color:var(--ink);padding:12px 14px;font-family:inherit;font-size:15px}
.search::placeholder{color:var(--faint)}
.overlay{position:fixed;inset:0;z-index:80;background:rgba(4,12,12,.74);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border:1px solid var(--line2);border-radius:20px 20px 0 0;max-width:560px;width:100%;padding:20px 20px calc(24px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;animation:fade .3s ease}
.sheet h2{font-size:22px;margin:2px 0 10px}
.sheet .srow{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.5}
.sheet .srow:last-of-type{border-bottom:none}
.sheet .srow b{color:#f3a48f}
.sheet .ic{flex:0 0 22px;height:22px;border-radius:50%;background:var(--dangerBg);border:1px solid #5a2c22;color:#f3a48f;display:grid;place-items:center;font-weight:700;font-size:13px}
.installbar{position:fixed;top:0;left:0;right:0;z-index:60;max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 12px;background:linear-gradient(180deg,#1c3133,#17282a);border-bottom:1px solid var(--line2);box-shadow:0 6px 20px rgba(0,0,0,.4);animation:fade .3s ease}
.installbar .ib-ic{width:30px;height:30px;border-radius:8px;flex:0 0 auto;background:radial-gradient(circle at 30% 30%,var(--teal),var(--teal2));box-shadow:0 0 12px var(--tealD)}
.installbar .ib-tx{flex:1;font-size:12.5px;line-height:1.35;color:var(--ink)}
.installbar .ib-tx b{font-family:"Fraunces",Georgia,serif}
.installbar .ib-btn{background:linear-gradient(180deg,var(--teal),var(--tealD));color:#04201d;border:none;border-radius:9px;padding:8px 13px;font-weight:700;font-size:13px;white-space:nowrap}
.installbar .ib-x{background:none;border:none;color:var(--faint);font-size:19px;padding:2px 6px;line-height:1}
body.light{--bg:#eef3f2;--bg2:#e4edeb;--card:#ffffff;--card2:#eef4f2;--ink:#15302e;--mut:#5a726f;--faint:#8299a5;--line:rgba(0,0,0,.09);--line2:rgba(0,0,0,.16);--shadow:0 8px 24px rgba(20,60,58,.10)}
body.light .app{background:radial-gradient(1200px 500px at 50% -10%, #dcece9 0%, var(--bg) 60%)}
body.light .bar{background:linear-gradient(var(--bg),rgba(238,243,242,.7))}
body.light .nav{background:rgba(255,255,255,.85);box-shadow:0 12px 32px rgba(20,60,58,.14)}
body.light .nav button.on{background:rgba(45,182,164,.16)}
body.light .player{background:radial-gradient(800px 500px at 50% 18%, #dcece9, var(--bg) 70%)}
body.light .installbar{background:linear-gradient(180deg,#ffffff,#eef4f2)}
body.light .orb-count{color:#04201d;text-shadow:0 1px 3px rgba(255,255,255,.5)}
body.light .safety{background:#fdeceb;border:1px solid #f0c2bb;color:#8a3524}
body.light .safety b{color:#b3402a}
body.light .orb-prog{background:conic-gradient(var(--teal) 0%, rgba(20,60,58,.10) 0)}
body.light .orb-ring{border-color:rgba(20,60,58,.16)}
body.light .sw{background:#d7e2df;border-color:rgba(0,0,0,.14)}
body.light .sw::after{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25)}
body.light .btn.primary,body.light .btn.amber{color:#06231f}
body.light .search{background:#fff}
body.light .spark .b small{color:var(--mut)}
body.light .disclaimer,body.light .src{color:#7b8f8c}
body.light .brand .ver{color:var(--faint)}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="brand"><span class="dot"></span> OA 2.0</div>
    <button class="boltchip" onclick="go('detail','bolt')">
      <span>BOLT</span><b id="chipBolt">—</b><small id="chipZone"></small>
    </button>
  </div>
  <div id="view" class="view"></div>
  <div class="nav">
    <button data-nav="home" class="on" onclick="go('home')"><span class="ni">◎</span>Accueil</button>
    <button data-nav="cats" onclick="go('cats')"><span class="ni">≋</span>Exercices</button>
    <button data-nav="track" onclick="go('track')"><span class="ni">⤴</span>Suivi</button>
    <button data-nav="info" onclick="go('info')"><span class="ni">𝒾</span>Méthode</button>
    <button data-nav="prog2" onclick="go('prog2')"><span class="ni">⛰</span>Programmes</button>
  </div>
</div>
<div id="playerRoot"></div>

<script>
const LS=window.localStorage;
function load(k,d){try{const v=LS.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function save(k,v){try{LS.setItem(k,JSON.stringify(v))}catch(e){}}
let boltHist=load('sf_bolt',[]);
let sessions=load('sf_sess',[]);
let settings=load('sf_set',{sound:true,vibe:true});
let metrics=load('sf_metrics',[]);
let timers=load('sf_timers',{});
let altWeeks=load('sf_altweeks',12);
let altLevel=load('sf_altlevel','confirme');
let apWeeks=load('sf_apweeks',12);
let apLevel=load('sf_aplevel','confirme');
function todayMetric(){return metrics.filter(function(m){return m.t===todayISO();})[0];}
function saveMetric(o){var m=todayMetric();if(!m){m={t:todayISO()};metrics.push(m);}for(var k in o)m[k]=o[k];if(metrics.length>400)metrics=metrics.slice(-400);save('sf_metrics',metrics);}
function logApnea(v){if(!v)return;var m=todayMetric();var cur=(m&&m.apnea)?m.apnea:0;saveMetric({apnea:Math.max(cur,v)});}
function boltTrend(){
  if(boltHist.length<2)return{dir:'—',delta:0,avg:null};
  var last=boltHist[boltHist.length-1].s;
  var recent=boltHist.slice(-8,-1).map(function(b){return b.s;});
  if(!recent.length)return{dir:'—',delta:0,avg:null};
  var avg=recent.reduce(function(a,b){return a+b;},0)/recent.length;
  var d=last-avg;
  return{dir:d>0.8?'hausse':(d<-0.8?'baisse':'stable'),delta:d,avg:avg};
}
function readiness(){
  var s=lastBolt();
  if(s==null)return{phase:'—',deload:false,dropping:false,msg:'Fais ton test BOLT pour calibrer la journée.'};
  var t=boltTrend();var dropping=(t.dir==='baisse');var phase,msg;
  if(s<25){phase='A';msg='Phase A — fondations & récup. Priorité sommeil + nasal 24/7. Pas de table O₂ ni de VHL.';}
  else if(s<30){phase='B';msg='Phase B (Palier 2) — introduction de la table O₂ (accompagné, oxymètre, SpO₂ ≥ 85 %) + apnea walk, table CO₂, VHL. Progression en douceur.';}
  else if(s<40){phase='C';msg='Phase C — programme complet : table O₂, VHL 2-3×/sem (dont haute intensité), apnées plus longues.';}
  else {phase='C+';msg='Optimal — maintien & perf. Re-teste l’apnée max de temps en temps.';}
  if(dropping&&s>=25){msg='BOLT en baisse : jour allégé conseillé aujourd’hui, même si ta zone le permettrait. On consolide.';}
  return{phase:phase,deload:(s<25||dropping),dropping:dropping,trend:t,msg:msg};
}

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function fmt(s){s=Math.max(0,Math.round(s));const m=Math.floor(s/60),r=s%60;return m>0?(m+':'+String(r).padStart(2,'0')):(r+'s');}
function todayISO(){return new Date().toISOString().slice(0,10);}
function lastBolt(){return boltHist.length?boltHist[boltHist.length-1].s:null;}
function boltZone(s){
  if(s==null)return{l:'Non mesuré',c:'#5f7c79'};
  if(s<10)return{l:'Très dysfonctionnelle',c:'#b5462f'};
  if(s<20)return{l:'Dysfonctionnelle',c:'#c86a3a'};
  if(s<25)return{l:'Sous le seuil',c:'#c8902f'};
  if(s<30)return{l:'Acceptable',c:'#9a9a3f'};
  if(s<40)return{l:'Bon',c:'#3f9e86'};
  return{l:'Optimal',c:'#2db6a4'};
}
function beep(f,d){f=f||660;d=d||0.12;
  if(!settings.sound)return;
  try{const a=beep._c||(beep._c=new (window.AudioContext||window.webkitAudioContext)());
    const o=a.createOscillator(),g=a.createGain();o.frequency.value=f;o.type='sine';
    o.connect(g);g.connect(a.destination);g.gain.setValueAtTime(.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.25,a.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);
    o.start();o.stop(a.currentTime+d+.02);}catch(e){}
}

function exById(id){return EX.find(e=>e.id===id);}
function exByCat(c){return EX.filter(e=>e.cat===c);}

let cur='home';let showDone=false;let showAdjust=false;
function doneMap(){var t=todayISO(),m={};sessions.forEach(function(s){if((s.t||'').slice(0,10)===t)m[s.name]=1;});return m;}
function setNav(n){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.nav===n));}
function go(where,arg){
  if(where!=='detail')showAdjust=false;
  cur=where;const v=$('#view');
  if(where==='home'){renderHome(v);setNav('home');}
  else if(where==='cats'){renderCats(v);setNav('cats');}
  else if(where==='catlist'){renderCatList(v,arg);setNav('cats');}
  else if(where==='detail'){renderDetail(v,arg);setNav('cats');}
  else if(where==='track'){renderTrack(v);setNav('track');}
  else if(where==='info'){renderInfo(v);setNav('info');}
  else if(where==='prog'){renderProg(v);setNav('info');}
  else if(where==='sport'){renderSport(v);setNav('home');}
  else if(where==='prog2'){go(load('sf_progtab','altitude'));return;}
  else if(where==='altitude'){save('sf_progtab','altitude');renderAltitude(v);setNav('prog2');}
  else if(where==='apnea'){save('sf_progtab','apnea');renderApnea(v);setNav('prog2');}
  window.scrollTo(0,0);refreshChip();
}
function refreshChip(){
  const s=lastBolt(),z=boltZone(s);
  $('#chipBolt').textContent=s==null?'—':s+'s';
  $('#chipZone').textContent=s==null?'à tester':z.l.split(' ')[0];
  $('#chipZone').style.color=z.c;
}

function backupDue(){
  var n=boltHist.length+sessions.length+metrics.length;
  if(n<5)return 0;
  var last=load('sf_lastbackup',null);
  if(!last)return n;
  var days=Math.floor((new Date(todayISO())-new Date(last))/86400000);
  return days>=14?days:0;
}

function dayBlock(s){
  // bloc du midi selon le jour de semaine, calibré par la zone (0=dim..6=sam)
  var d=new Date().getDay();
  var wk = s<30
    ? [null,['warmup','apnea','ribmob'],['warmup','co2table'],['warmup','apnea','diadrop'],null,['warmup','co2table','ribmob'],['warmup','apnea','mbt']]
    : [null,['warmup','hast','ribmob'],['warmup','vhl'],['warmup','co2table','diadrop'],null,['warmup','o2table'],['warmup','sharkfit','mbt']];
  return wk[d]||null;
}
function dayPlan(){
  var s=lastBolt(),r=readiness();
  if(s==null)return [{t:'Commence ici',ids:['bolt','light','coh']}];
  if(r.deload){
    return [
      {t:'Matin',ids:['unblock','bolt','light','coh']},
      {t:'Journée',ids:['diadrop']},
      {t:'Fin d’après-midi',ids:['unblock','light']},
      {t:'Soir',ids:['sigh','478']}
    ];
  }
  var noon=dayBlock(s);
  var plan=[
    {t:'Matin',ids:['unblock','bolt','light','coh']},
    noon?{t:'Midi — bloc du jour',ids:noon}:{t:'Midi — récupération',ids:['light','diadrop']},
    {t:'Fin d’après-midi',ids:['unblock','light']},
    {t:'Soir',ids:['sigh','478','nadi']}
  ];
  return plan;
}

function norm(x){return (x||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}
function renderCats(v){
  v.innerHTML='';
  v.appendChild(el('div','kicker','Bibliothèque'));
  v.appendChild(el('h1','h-hero display','Exercices'));
  var srch=el('input','search');srch.type='search';srch.placeholder='Rechercher un exercice…';srch.setAttribute('inputmode','search');
  v.appendChild(srch);
  var res=el('div');v.appendChild(res);
  const g=el('div','tiles');
  CATS.forEach(cat=>{
    const t=el('button','tile');t.onclick=()=>go('catlist',cat.id);
    t.innerHTML='<div class="cnt">'+exByCat(cat.id).length+'</div>'+
      '<div class="ic" style="background:'+cat.col+'22;color:'+cat.col+'">'+cat.ic+'</div>'+
      '<div><h3>'+cat.name+'</h3><small>'+cat.desc+'</small></div>';
    g.appendChild(t);
  });
  function draw(q){
    res.innerHTML='';q=norm(q);
    if(!q){res.appendChild(g);return;}
    var hits=EX.filter(function(e){return norm(e.name+' '+e.benefit).indexOf(q)>=0;});
    if(!hits.length){res.appendChild(el('p','muted','Aucun résultat.'));return;}
    hits.forEach(function(e){res.appendChild(exRow(e));});
  }
  srch.oninput=function(){draw(srch.value);};
  draw('');
}

/* ---- player engine ---- */
let activeTimers=[],cancelled=false;let chain=[];
function clearTimers(){activeTimers.forEach(t=>{clearTimeout(t);clearInterval(t);});activeTimers=[];}
function closePlayer(){cancelled=true;clearTimers();releaseWake();chain=[];$('#playerRoot').innerHTML='';}
function logSession(name){sessions.push({t:new Date().toISOString(),name:name});if(sessions.length>200)sessions=sessions.slice(-200);save('sf_sess',sessions);}
function playerShell(title,bodyHtml){
  cancelled=false;clearTimers();
  const p=el('div','player');
  p.innerHTML='<div class="ptop"><b>'+title+'</b><button class="pclose" onclick="closePlayer()">Fermer</button></div>'+
    '<div class="pstage" id="pstage">'+(bodyHtml||'')+'</div><div class="pctrl" id="pctrl"></div>';
  $('#playerRoot').innerHTML='';$('#playerRoot').appendChild(p);requestWake();return p;
}
function startBlock(ids){var play=ids.map(exById).filter(function(e){return e&&e.player!=='info';});if(!play.length)return;chain=play.slice(1).map(function(e){return e.id;});openPlayer(play[0]);}
function chainNext(){var id=chain.shift(),e=exById(id);cancelled=true;clearTimers();$('#playerRoot').innerHTML='';if(e){setTimeout(function(){openPlayer(e);},60);}else{releaseWake();}}
function doneBtn(){return chain.length?('<button class="btn block primary" onclick="chainNext()">Suivant · '+(exById(chain[0])?exById(chain[0]).name:'')+' ›</button>'):'<button class="btn block primary" onclick="closePlayer()">Fermer</button>';}
function openPlayer(e){
  if(e.player==='pacer')playPacer(e);
  else if(e.player==='bolt')playBolt(e);
  else if(e.player==='hold')playHold(e);
  else if(e.player==='apnea')playApnea(e);
  else if(e.player==='table')playTable(e);
  else if(e.player==='o2table')playO2Table(e);
  else if(e.player==='reps')playReps(e);
}
function sleep(ms){return new Promise(function(res,rej){const t=setTimeout(function(){cancelled?rej('x'):res();},ms);activeTimers.push(t);});}

function pacerCfg(e){
  var base=e.pacer,ov=timers[e.id]||{};
  var phases=base.phases.map(function(ph,i){return {l:ph.l,k:ph.k,d:(ov.phases&&ov.phases[i]!=null)?ov.phases[i]:ph.d};});
  var cfg={kind:base.kind,phases:phases,note:base.note};
  if(base.cycles!=null)cfg.cycles=(ov.cycles!=null?ov.cycles:base.cycles);
  if(base.secs!=null)cfg.secs=(ov.secs!=null?ov.secs:base.secs);
  return cfg;
}
function playPacer(e){
  const cfg=pacerCfg(e);
  playerShell(e.name,
    '<div class="orb-wrap"><div class="orb-prog" id="oprog"></div><div class="orb-ring"></div><div class="orb '+(cfg.kind==='co2'?'co2':'')+'" id="orb"></div><div class="orb-count" id="pcount"></div></div>'+
    '<div class="phase" id="phase">Prêt ?</div>'+
    '<div class="subt" id="psub">'+(cfg.note||'')+'</div>'+
    '<div class="counters" style="margin-top:8px"><div><b id="ptimer">'+(cfg.cycles?('0/'+cfg.cycles):fmt(cfg.secs))+'</b>'+(cfg.cycles?'cycles':'restant')+'</div></div>');
  $('#pctrl').innerHTML='<button class="btn block primary" id="pgo">Commencer</button>';
  $('#pgo').onclick=function(){$('#pgo').remove();runPacer(e);};
}
async function runPacer(e){
  const cfg=pacerCfg(e),orb=$('#orb');
  let cycle=0,elapsed=0;const total=cfg.secs||0;
  const scaleFor=function(k){return k==='in'?1:k==='in2'?1.08:(k==='out'?0.55:(k==='hold'?1:0.55));};
  function setProg(pp){var o=$('#oprog');if(o)o.style.background='conic-gradient(var(--teal) '+Math.min(100,Math.max(0,pp))+'%, rgba(255,255,255,.05) 0)';}
  async function phaseCountdown(sec){
    let acc=0;$('#pcount').textContent=Math.ceil(sec);
    while(acc<sec-0.001){
      const step=Math.min(1,sec-acc);
      await sleep(step*1000);acc+=step;
      $('#pcount').textContent=Math.max(0,Math.ceil(sec-acc));
      if(cfg.secs){$('#ptimer').textContent=fmt(Math.max(0,total-(elapsed+acc)));setProg((elapsed+acc)/total*100);}
    }
  }
  try{
    await sleep(400);
    while(!cancelled){
      for(let i=0;i<cfg.phases.length;i++){
        const ph=cfg.phases[i],hold=(ph.k==='hold'||ph.k==='pause');
        $('#phase').textContent=ph.l;
        orb.classList.toggle('holding',hold);
        beep(ph.k==='in'||ph.k==='in2'?720:ph.k==='out'?440:560,0.1);
        vibe(hold?60:(ph.k==='out'?[12,40,12]:15));
        orb.style.transitionDuration=ph.d+'s';
        orb.style.transform='scale('+scaleFor(ph.k)+')';
        await phaseCountdown(ph.d);
        elapsed+=ph.d;
        if(cfg.secs)$('#ptimer').textContent=fmt(Math.max(0,total-elapsed));
      }
      cycle++;
      if(cfg.cycles){$('#ptimer').textContent=cycle+'/'+cfg.cycles;setProg(cycle/cfg.cycles*100);if(cycle>=cfg.cycles)break;}
      if(cfg.secs&&elapsed>=total)break;
    }
    if(!cancelled)finishPacer(e);
  }catch(x){}
}
function finishPacer(e){
  beep(880,0.18);vibe([30,40,30]);logSession(e.name);
  $('#phase').textContent='Terminé';$('#ptimer').textContent='✓';
  var pc=$('#pcount');if(pc)pc.textContent='';
  var op=$('#oprog');if(op)op.style.background='conic-gradient(var(--teal) 100%, transparent 0)';
  var ob=$('#orb');if(ob)ob.classList.remove('holding');
  $('#psub').textContent='Belle séance. Laisse la 1re respiration rester calme.';
  $('#orb').style.transform='scale(.7)';
  $('#pctrl').innerHTML=''+doneBtn()+'';
}

function playBolt(e){
  playerShell('Test BOLT',
    '<div class="phase" id="phase">Expire normalement, puis pince le nez</div>'+
    '<div class="bigtimer" id="ptimer">0s</div>'+
    '<div class="subt">Arrête au <b>premier désir défini</b> de respirer. Ce n’est pas une apnée maximale.</div>');
  let t0=null,iv=null,running=false;const ctrl=$('#pctrl');
  ctrl.innerHTML='<button class="btn block primary" id="pgo">Démarrer le compte</button>';
  $('#pgo').onclick=function(){
    if(running)return;running=true;t0=Date.now();
    iv=setInterval(function(){$('#ptimer').textContent=Math.floor((Date.now()-t0)/1000)+'s';},200);activeTimers.push(iv);
    $('#phase').textContent='Tiens… au 1er désir, appuie';
    ctrl.innerHTML='<button class="btn block amber" id="pstop">Premier désir — Stop</button>';
    $('#pstop').onclick=function(){clearInterval(iv);finishBolt(Math.round((Date.now()-t0)/1000));};
  };
}
function finishBolt(sc){
  beep(740,0.15);vibe(40);
  boltHist.push({t:todayISO(),s:sc});if(boltHist.length>400)boltHist=boltHist.slice(-400);save('sf_bolt',boltHist);
  logSession('Test BOLT');const z=boltZone(sc);
  $('#phase').textContent='Score enregistré';$('#ptimer').textContent=sc+'s';
  $('#pstage').innerHTML+='<div class="zone-pill" style="background:'+z.c+'22;color:'+z.c+';border:1px solid '+z.c+'55">'+z.l+'</div><div class="subt">'+boltAdvice(sc)+'</div>';
  $('#pctrl').innerHTML=chain.length?doneBtn():'<button class="btn block primary" onclick="closePlayer();go(\'home\')">Voir ma routine</button>';
  refreshChip();
}
function boltAdvice(s){
  if(s<20)return'Priorité : respiration légère et cohérence. Les apnées attendront ~20 s. Soigne sommeil et respiration nasale.';
  if(s<30)return'Bonne base. Ajoute apnea walk et la table CO₂ légère. Vise +1 à +2 s/semaine.';
  if(s<40)return'Très bien. Tu peux intégrer la table CO₂ et l’apnée en mouvement.';
  return'Optimal. Maintiens ce niveau ~6 mois ; l’apnée en mouvement est accessible.';
}

function apneaCfg(e){var b=e.apnea,ov=timers[e.id]||{};return {rounds:ov.rounds!=null?ov.rounds:b.rounds,reduced:ov.reduced!=null?ov.reduced:b.reduced,recover:ov.recover!=null?ov.recover:b.recover,walkPrep:b.walkPrep};}
async function playApnea(e){
  const cf=apneaCfg(e);let round=0,holds=[];
  playerShell(e.name,
    '<div class="phase" id="phase">'+(cf.walkPrep?'Marche ~1 min en respiration nasale':'Prépare-toi')+'</div>'+
    '<div class="bigtimer" id="ptimer" style="font-size:54px">—</div>'+
    '<div class="subt" id="psub">Prépare-toi en respirant calmement (~3-4/min). Jamais d’hyperventilation. Appuie quand tu es prêt.</div>'+
    '<div class="counters" style="margin-top:6px"><div><b id="cr">0</b>apnée(s)</div><div><b id="cn">'+cf.rounds+'</b>objectif</div></div>');
  const phase=$('#phase'),timer=$('#ptimer'),sub=$('#psub');
  function ctrl(h){$('#pctrl').innerHTML=h;}
  function countdown(sec,cls){return new Promise(function(res){let left=sec;timer.textContent=left+'s';timer.className='bigtimer '+cls;
    const iv=setInterval(function(){left--;timer.textContent=left+'s';if(left<=0){clearInterval(iv);timer.className='bigtimer';beep(560,0.08);vibe(15);res();}},1000);activeTimers.push(iv);});}
  async function afterHold(d){
    timer.textContent=d+'s';
    if(cf.reduced>0){phase.textContent='Respiration réduite';sub.textContent='Minimise ta respiration.';await countdown(cf.reduced,'note-amber');}
    if(cancelled)return;
    phase.textContent='Récupère';sub.textContent='6 souffles nettoyants (courts, calmes), puis respiration nasale normale.';await countdown(cf.recover,'note-teal');
    if(cancelled)return;

    phase.textContent='Prêt pour la suivante ?';timer.textContent='—';
    ctrl('<button class="btn block primary" id="b">Apnée suivante</button>');$('#b').onclick=doHold;
  }
  function doHold(){
    round++;$('#cr').textContent=round;
    phase.textContent='Expire, pince le nez, marche en apnée';beep(500,0.12);vibe(20);
    const t0=Date.now();const iv=setInterval(function(){timer.textContent=Math.floor((Date.now()-t0)/1000)+'s';},200);activeTimers.push(iv);
    sub.innerHTML='Marche jusqu’à une faim d’air <b>moyenne à forte</b>.';
    ctrl('<button class="btn block amber" id="b">Reprends (faim d’air)</button>');
    $('#b').onclick=function(){clearInterval(iv);const d=Math.round((Date.now()-t0)/1000);holds.push(d);beep(620,0.1);vibe(25);afterHold(d);};
  }
  function finish(){logSession(e.name);

    phase.textContent='Séance terminée';timer.textContent='✓';timer.className='bigtimer';
    var _mx=holds.length?Math.max.apply(null,holds):0;if(_mx)logApnea(_mx);

    ctrl(''+doneBtn()+'');
  }
  ctrl('<button class="btn block primary" id="b">Commencer</button>');$('#b').onclick=doHold;
}

function playTable(e){
  const bolt=lastBolt(),ret=load('sf_retmax',null),ov=timers['co2table']||{};
  let hold=ov.hold!=null?ov.hold:(ret?Math.round(ret/2):(bolt||20));
  let rounds=ov.rounds!=null?ov.rounds:8,rest0=ov.rest0!=null?ov.rest0:Math.max(40,Math.round(75-0.7*(bolt||20)));

function beginnerize(p){
  if(!p)return p;
  p=p.replace(/SpO₂ 8[0-4] %/g,'SpO₂ 85 %');
  p=p.replace(/(\d+)(?:-(\d+))? cycles/g,function(m,a,b){return Math.max(4,(+(b||a))-2)+' cycles';});
  p=p.replace(/(\d+) rép/g,function(m,a){return Math.max(4,(+a)-2)+' rép';});
  return p;
}

  epo.innerHTML='<div class="field-t">EPO &amp; altitude — au juste</div><div class="muted">L’EPO est surtout déclenchée par l’<b>hypoxie</b> (rein, voie HIF). La voie fiable = <b>altitude</b> réelle ou simulée. L’<b>apnée</b> provoque une contraction de la rate (↑ hémoglobine transitoire) et une hausse d’EPO jusqu’à ~5 h après l’effort — mais de façon nette seulement avec des apnées <b>longues et intenses</b>, chez des pratiquants <b>expérimentés</b>. Tes apnées courtes (VHL) donnent surtout des gains <b>métaboliques</b> (CO₂/lactate, RSA), pas un vrai gain hématologique durable.</div>';
